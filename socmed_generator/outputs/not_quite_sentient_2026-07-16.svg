  <rect width="1080" height="1080" fill="#2D1B4E"/>
  <text x="540.0" y="392.0" text-anchor="middle" font-family="sans-serif"
        font-size="56" font-weight="700" fill="#F5F5F5">
    <tspan x="540.0" dy="0">Stop using “AGI” as a</tspan><tspan x="540.0" dy="68">synonym for “it’s getting</tspan><tspan x="540.0" dy="68">scary.”  We’ve turned</tspan><tspan x="540.0" dy="68">Artificial General</tspan><tspan x="540.0" dy="68">Intelligence into a</tspan><tspan x="540.0" dy="68">marketing bogeyman.</tspan>
