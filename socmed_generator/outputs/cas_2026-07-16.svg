<svg width="1080" height="1080" viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg">
  <rect width="1080" height="1080" fill="#7C2D12"/>
  <text x="540.0" y="188.0" text-anchor="middle" font-family="sans-serif"
        font-size="56" font-weight="700" fill="#F5F5F5">
    <tspan x="540.0" dy="0">Stop treating your instant</tspan><tspan x="540.0" dy="68">messages like an office</tspan><tspan x="540.0" dy="68">hallway.  The biggest trap</tspan><tspan x="540.0" dy="68">in remote life is</tspan><tspan x="540.0" dy="68">"Immediate Response</tspan><tspan x="540.0" dy="68">Culture." When we treat</tspan><tspan x="540.0" dy="68">every notification as an</tspan><tspan x="540.0" dy="68">emergency, we aren't being</tspan><tspan x="540.0" dy="68">more productive—we’re just</tspan><tspan x="540.0" dy="68">letting our focus be</tspan><tspan x="540.0" dy="68">nibbled away by constant</tspan><tspan x="540.0" dy="68">interruptions.</tspan>
  </text>
  <text x="60" y="1020" font-family="monospace" font-size="24" fill="#F97316" letter-spacing="2">CTRL+ALT+SURVIVE</text>
</svg>